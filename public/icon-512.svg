<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#060b1a"/>
  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#dots)"/>
  <!-- Blue accent top bar -->
  <rect x="0" y="0" width="512" height="5" rx="5" fill="#3b82f6" opacity="0.7"/>
  <!-- Zap lightning bolt -->
  <g transform="translate(256,220)">
    <path d="M-52,-95 L18,-12 L-18,-12 L52,95 L-18,12 L18,12 Z" fill="#3b82f6"/>
    <path d="M-52,-95 L18,-12 L-18,-12 L52,95 L-18,12 L18,12 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linejoin="round"/>
  </g>
  <!-- FahrVerse wordmark -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="-1">FahrVerse</text>
  <text x="256" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="6">NIGERIA</text>
</svg>