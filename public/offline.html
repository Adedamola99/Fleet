<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>FahrVerse — Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: #060b1a;
        color: #f1f5f9;
        font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .wrap {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: #3b82f6;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        box-shadow: 0 0 0 16px rgba(59, 130, 246, 0.1);
      }
      .icon svg {
        width: 40px;
        height: 40px;
        fill: #fff;
      }
      h1 {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
      }
      p {
        font-size: 15px;
        color: rgba(100, 116, 139, 1);
        line-height: 1.7;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #3b82f6;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 28px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #2563eb;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        color: rgba(71, 85, 105, 1);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-top: 28px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.15;
        }
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ef4444;
        animation: blink 2s ease infinite;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">
        <svg viewBox="0 0 24 24">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
        </svg>
      </div>
      <h1>You're Offline</h1>
      <p>
        FahrVerse needs a connection to load. Check your internet and try again
        — your data will be here when you're back.
      </p>
      <a href="/" class="btn" onclick="location.reload()">↻ Try Again</a>
      <div class="tag">
        <span class="dot"></span>
        No connection detected
      </div>
    </div>
  </body>
</html>
